services:
  # ── Frontend (Static Site) ──────────────────────────────────────────────────
  - type: web
    name: trakvui-frontend
    env: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        # Set this to your backend's Render URL once it is deployed,
        # e.g. https://trakvui-backend.onrender.com
        sync: false
    routes:
      # Redirect all routes to index.html for client-side routing (React Router)
      - type: rewrite
        source: /*
        destination: /index.html
